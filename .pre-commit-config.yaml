exclude: '^docs/|/migrations/|devcontainer.json|static/|media/|locale/|infra/|src/dist/|\.egg-info/'
default_stages: [ pre-commit ]
minimum_pre_commit_version: "4.1.0"

default_language_version:
  python: python3.12

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '(\.svg|\.mp3|\.mp4|\.gif|\.webp|\.jpg|\.jpeg|\.png|\.ico|\.ttf|\.woff|\.woff2|\.eot)$'
      - id: end-of-file-fixer
        exclude: '(\.svg|\.mp3|\.mp4|\.gif|\.webp|\.jpg|\.jpeg|\.png|\.ico|\.ttf|\.woff|\.woff2|\.eot)$'
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key
      - id: forbid-new-submodules
      - id: mixed-line-ending
        exclude: '(\.svg|\.mp3|\.mp4|\.gif|\.webp|\.jpg|\.jpeg|\.png|\.ico|\.ttf|\.woff|\.woff2|\.eot)$'
      - id: check-added-large-files

  - repo: https://github.com/adamchainz/django-upgrade
    rev: '1.31.1'
    hooks:
      - id: django-upgrade
        args: [ '--target-version', '6.0' ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [ --fix, --exit-non-zero-on-fix ]
        exclude: '(^docs/|/migrations/|^static/|^media/|^locale/|^infra/|^src/dist/)'
      - id: ruff-format
        exclude: '(^docs/|/migrations/|^static/|^media/|^locale/|^infra/|^src/dist/)'

  - repo: https://github.com/Riverside-Healthcare/djLint
    rev: v1.39.4
    hooks:
      - id: djlint-reformat-django
      - id: djlint-django

  # Security vulnerability scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [ -c, .bandit, -r, src/ ]
        exclude: 'tests/|conftest.py|/migrations/'

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [ --config-file=.yamllint ]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        args: [ --ignore=node_modules ]

  # Spell checking
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: [ --config=.codespellrc ]

ci:
  autoupdate_schedule: weekly
  skip: [ ]
  submodules: false
