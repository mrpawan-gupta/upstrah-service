
[pytest]
# Django settings module configuration
DJANGO_SETTINGS_MODULE = upstrah.settings.local

# Test discovery patterns
python_files = test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Run `async def` tests without a per-test marker.
asyncio_mode = auto

# Default command line options
addopts =
    -p no:warnings
    --strict-markers
    --create-db
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=json
    --cov-branch
    --tb=short
    -v
    --maxfail=1

# Test markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    smoke: marks tests as smoke tests
    e2e: marks tests as end-to-end tests
    django_db: marks tests that require database access
    asyncio: marks tests as async tests

# Where to look for tests (all tests live in the top-level tests/ tree)
testpaths = tests

# Minimum version requirement
minversion = 7.0

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    error::UserWarning

# Environment variables required for the test run
env =
    JWT_PRIVATE_KEY=local-dev-secret
    GS_BUCKET_NAME=dummy
    GS_STATIC_BUCKET_NAME=dummy

# Coverage is configured under [tool.coverage.*] in pyproject.toml — coverage.py
# does not read [coverage:*] sections from pytest.ini, so they are not duplicated here.
